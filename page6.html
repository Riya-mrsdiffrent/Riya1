<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A love declaration for Riya from Moksh.">
  <title>I Love You, Riyaaaaaa 💗</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="romantic.css">

  <style>
    :root {
      --blush-pink: #F7D9DD;
      --pastel-blue: #C9E4F6;
      --warm-white: #FFFDFB;
      --deep-rose: #E8849C;
      --soft-blue: #7FB8DE;
      --text-dark: #3A3238;
      --text-muted: #6E626B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--warm-white);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 32px 24px;
    }

    /* Background blobs */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: var(--warm-white);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.5;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .blob-pink {
      background-color: var(--blush-pink);
      top: -15%;
      left: -15%;
      animation: driftPink 20s ease-in-out infinite alternate;
    }

    .blob-blue {
      background-color: var(--pastel-blue);
      bottom: -15%;
      right: -15%;
      animation: driftBlue 20s ease-in-out infinite alternate;
    }

    .blob-rose {
      background-color: #f5c5cf;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      animation: driftRose 15s ease-in-out infinite alternate;
    }

    @keyframes driftPink {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(80px, 60px) scale(1.1); }
    }
    @keyframes driftBlue {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(-80px, -60px) scale(0.95); }
    }
    @keyframes driftRose {
      0%   { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -50%) scale(1.15); }
    }

    /* Background elements handled via romantic.css */

    /* Card */
    .card {
      background: rgba(255, 253, 251, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 32px;
      padding: 64px 48px;
      max-width: 640px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 10;
      box-shadow:
        0 20px 50px rgba(232, 132, 156, 0.12),
        0 8px 20px rgba(127, 184, 222, 0.06);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--deep-rose) 0%, var(--soft-blue) 100%);
      border-radius: 32px 32px 0 0;
    }

    /* Big heart icon */
    .heart-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 24px;
      animation: heartbeat 1.2s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%   { transform: scale(1); }
      14%  { transform: scale(1.18); }
      28%  { transform: scale(1); }
      42%  { transform: scale(1.12); }
      70%  { transform: scale(1); }
    }

    /* Main love declaration */
    .love-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      color: var(--deep-rose);
      line-height: 1.2;
      margin-bottom: 12px;
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0%   { text-shadow: 0 0 10px rgba(232,132,156,0.3); }
      100% { text-shadow: 0 0 30px rgba(232,132,156,0.7), 0 0 60px rgba(232,132,156,0.3); }
    }

    /* Trailing "aaaaa" in cursive */
    .love-trail {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--deep-rose);
      opacity: 0.75;
      display: block;
      margin-bottom: 32px;
      word-break: break-word;
      overflow-wrap: break-word;
      animation: wave 2.5s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: skewX(-2deg); }
      50%       { transform: skewX(2deg); }
    }

    /* Subtitle */
    .subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    /* WhatsApp button */
    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.5px;
      color: white;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      padding: 16px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.35);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-whatsapp:hover, .btn-whatsapp:focus {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 12px 32px rgba(37, 211, 102, 0.5);
    }

    .btn-whatsapp:active {
      transform: translateY(-1px) scale(1.01);
    }

    .btn-whatsapp svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* Entrance animations */
    .fade-in {
      opacity: 0;
      transform: translateY(32px);
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.5s; }
    .delay-3 { animation-delay: 0.9s; }
    .delay-4 { animation-delay: 1.3s; }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 48px 24px; }
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blobs">
    <div class="blob blob-pink"></div>
    <div class="blob blob-blue"></div>
    <div class="blob blob-rose"></div>
  </div>

  <!-- Floating hearts and flowers handled by romantic.js -->

  <!-- Main Card -->
  <main class="card">

    <span class="heart-icon fade-in delay-1">💗</span>

    <!-- Love declaration -->
    <h1 class="love-text fade-in delay-2">I LOVE YOU</h1>
    <span class="love-trail fade-in delay-2">Riyaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</span>

    <p class="subtitle fade-in delay-3">
      You just made me the happiest person alive.<br>
      Now let me know you mean it 🥺
    </p>

    <!-- WhatsApp link with auto-typed message -->
    <a
      href="https://wa.me/919978729787?text=I%20accept%20your%20proposal%20%F0%9F%92%97"
      target="_blank"
      class="btn-whatsapp fade-in delay-4"
      id="whatsapp-btn"
    >
      <!-- WhatsApp icon -->
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Text Me on WhatsApp 💬
    </a>

  </main>

  <script src="romantic.js" defer></script>
</body>
</html>
